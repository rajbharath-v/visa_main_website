{% load static %}
<form method="POST" action="/enquiry/submit/" class="enquiry-form space-y-3">
  {% csrf_token %}
  {% if product_slug %}<input type="hidden" name="product_slug" value="{{ product_slug }}">{% endif %}
  {% if product_name_val %}<input type="hidden" name="product_name" value="{{ product_name_val }}">{% endif %}

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Name *</label>
      <input type="text" name="name" required placeholder="Your name"
             class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-900">
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Phone *</label>
      <div class="flex">
        <select id="cc_main" class="px-2 py-3 rounded-l-lg border border-r-0 border-gray-200 bg-gray-50 text-gray-700 text-sm focus:outline-none focus:border-blue-500" style="min-width:80px">
          <option value="+91" selected>🇮🇳 +91</option>
          <option value="+1">🇺🇸 +1</option>
          <option value="+44">🇬🇧 +44</option>
          <option value="+61">🇦🇺 +61</option>
          <option value="+971">🇦🇪 +971</option>
          <option value="+966">🇸🇦 +966</option>
          <option value="+65">🇸🇬 +65</option>
          <option value="+60">🇲🇾 +60</option>
          <option value="+49">🇩🇪 +49</option>
          <option value="+33">🇫🇷 +33</option>
        </select>
        <input type="tel" id="ph_main" required placeholder="Phone number"
               inputmode="numeric"
               class="flex-1 px-4 py-3 rounded-r-lg border border-gray-200 focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-900"
               oninput="this.value=this.value.replace(/\D/g,'')">
        <input type="hidden" name="phone" id="phone_main">
      </div>
    </div>
  </div>

  <div>
    <label class="block text-xs font-medium text-gray-600 mb-1">Email <span class="text-gray-400">(optional)</span></label>
    <input type="email" name="email" placeholder="email@company.com"
           class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-900">
  </div>

  <div>
    <label class="block text-xs font-medium text-gray-600 mb-1">Message <span class="text-gray-400">(optional)</span></label>
    <textarea name="message" rows="3" placeholder="Any specific requirement?"
              class="w-full px-4 py-3 rounded-lg border border-gray-200 focus:outline-none focus:border-blue-500 text-sm bg-white text-gray-900 resize-none"></textarea>
  </div>

  <button type="submit"
          class="w-full bg-navy-600 hover:bg-navy-500 text-white font-semibold py-3 rounded-lg transition-colors flex items-center justify-center gap-2 text-sm">
    <i class="ti ti-send"></i>
    Send Enquiry
  </button>

  <p class="text-center text-xs text-gray-400">
    <i class="ti ti-lock text-xs mr-1"></i>
    Your information is secure and will not be shared.
  </p>
</form>
<script>
document.querySelectorAll('.enquiry-form').forEach(function(form){
  form.addEventListener('submit', function(){
    var cc  = form.querySelector('[id^="cc_"]');
    var ph  = form.querySelector('[id^="ph_"]');
    var hid = form.querySelector('[id^="phone_"]');
    if(cc && ph && hid) hid.value = cc.value + ph.value;
  });
});
</script>
