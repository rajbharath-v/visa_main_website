<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0f2040"/>
    </linearGradient>
    <linearGradient id="liquid1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="liquid2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="liquid3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Lab bench -->
  <rect x="20" y="220" width="360" height="14" rx="4" fill="#1e293b"/>
  <rect x="20" y="230" width="360" height="6" rx="2" fill="#0f172a"/>

  <!-- Beaker left large -->
  <path d="M55 120 L45 218 L115 218 L105 120 Z" fill="#0c1f35" stroke="#38bdf8" stroke-width="1.5"/>
  <path d="M60 170 L50 218 L110 218 L100 170 Z" fill="url(#liquid1)" opacity="0.3"/>
  <path d="M60 185 L51 218 L109 218 L100 185 Z" fill="url(#liquid1)" opacity="0.4"/>
  <!-- Beaker neck -->
  <rect x="68" y="100" width="24" height="22" rx="3" fill="#0c1f35" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Beaker lip -->
  <rect x="62" y="96" width="36" height="6" rx="2" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1"/>
  <!-- Bubbles in beaker -->
  <circle cx="72" cy="195" r="4" fill="#38bdf8" opacity="0.4"/>
  <circle cx="90" cy="205" r="3" fill="#7dd3fc" opacity="0.3"/>
  <circle cx="82" cy="188" r="2.5" fill="#38bdf8" opacity="0.5"/>
  <!-- Measurement lines -->
  <line x1="106" y1="145" x2="112" y2="145" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
  <line x1="108" y1="162" x2="112" y2="162" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
  <line x1="110" y1="179" x2="112" y2="179" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>
  <line x1="111" y1="196" x2="114" y2="196" stroke="#38bdf8" stroke-width="1" opacity="0.6"/>

  <!-- Erlenmeyer flask center -->
  <path d="M175 100 L175 155 L135 218 L225 218 L185 155 L185 100 Z" fill="#0c1f35" stroke="#a78bfa" stroke-width="1.5"/>
  <path d="M177 155 L140 218 L220 218 L183 155 Z" fill="url(#liquid2)" opacity="0.25"/>
  <path d="M177 175 L145 218 L215 218 L183 175 Z" fill="url(#liquid2)" opacity="0.35"/>
  <!-- Flask neck -->
  <rect x="171" y="80" width="18" height="22" rx="3" fill="#0c1f35" stroke="#a78bfa" stroke-width="1.5"/>
  <rect x="167" y="76" width="26" height="6" rx="2" fill="#1e1040" stroke="#a78bfa" stroke-width="1"/>
  <!-- Bubbles purple -->
  <circle cx="168" cy="196" r="4" fill="#a78bfa" opacity="0.4"/>
  <circle cx="185" cy="205" r="3" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="195" cy="192" r="2.5" fill="#a78bfa" opacity="0.5"/>
  <!-- Swirl line -->
  <path d="M160 185 Q180 175 200 185 Q180 195 160 185" stroke="#c4b5fd" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Test tubes right cluster -->
  <!-- Tube 1 -->
  <rect x="255" y="130" width="16" height="80" rx="8" fill="#0c1f35" stroke="#34d399" stroke-width="1.5"/>
  <rect x="257" y="170" width="12" height="36" rx="6" fill="url(#liquid3)" opacity="0.5"/>
  <rect x="262" y="126" width="6" height="6" rx="1" fill="#1e3a2a" stroke="#34d399" stroke-width="1"/>
  <!-- Tube 2 -->
  <rect x="280" y="120" width="16" height="90" rx="8" fill="#0c1f35" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="282" y="155" width="12" height="51" rx="6" fill="url(#liquid1)" opacity="0.5"/>
  <rect x="287" y="116" width="6" height="6" rx="1" fill="#1e2a3a" stroke="#38bdf8" stroke-width="1"/>
  <!-- Tube 3 -->
  <rect x="305" y="135" width="16" height="76" rx="8" fill="#0c1f35" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="307" y="168" width="12" height="39" rx="6" fill="#f59e0b" opacity="0.3"/>
  <rect x="312" y="131" width="6" height="6" rx="1" fill="#2a1a0a" stroke="#f59e0b" stroke-width="1"/>
  <!-- Tube rack -->
  <rect x="248" y="210" width="82" height="10" rx="3" fill="#1e293b"/>
  <rect x="252" y="208" width="6" height="14" rx="2" fill="#334155"/>
  <rect x="320" y="208" width="6" height="14" rx="2" fill="#334155"/>

  <!-- Microscope top right -->
  <rect x="340" y="155" width="8" height="55" rx="3" fill="#334155"/>
  <rect x="330" y="195" width="28" height="6" rx="2" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <ellipse cx="344" cy="175" rx="12" ry="8" fill="#1e293b" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="344" cy="175" r="5" fill="#0f172a"/>
  <circle cx="344" cy="175" r="2" fill="#60a5fa" opacity="0.6"/>
  <rect x="340" y="148" width="8" height="9" rx="2" fill="#475569"/>
  <rect x="333" y="208" width="22" height="12" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <line x1="344" y1="207" x2="344" y2="216" stroke="#475569" stroke-width="2"/>

  <!-- Dropper / pipette -->
  <rect x="138" y="70" width="5" height="40" rx="2" fill="#94a3b8"/>
  <ellipse cx="140.5" cy="68" rx="5" ry="7" fill="#64748b"/>
  <ellipse cx="140.5" cy="112" rx="2" ry="3" fill="#38bdf8" opacity="0.8"/>
  <!-- Drop falling -->
  <ellipse cx="140.5" cy="120" rx="2.5" ry="3.5" fill="#38bdf8" opacity="0.5"/>

  <!-- Screen / display -->
  <rect x="30" y="130" width="0" height="0"/>

  <!-- Particles / light dots -->
  <circle cx="240" cy="40" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="120" cy="55" r="1.5" fill="#38bdf8" opacity="0.4"/>
  <circle cx="350" cy="65" r="2" fill="#34d399" opacity="0.4"/>
  <circle cx="30" cy="60" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <circle cx="170" cy="38" r="1" fill="#a78bfa" opacity="0.5"/>
</svg>
