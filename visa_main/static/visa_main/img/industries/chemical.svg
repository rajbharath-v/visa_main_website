<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#2d1052"/>
    </linearGradient>
    <linearGradient id="reactor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" style="stop-color:#7c3aed" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#ffffff05" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#ffffff05" stroke-width="1"/>
  <line x1="0" y1="180" x2="400" y2="180" stroke="#ffffff05" stroke-width="1"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="#ffffff05" stroke-width="1"/>

  <!-- Large reactor vessel center -->
  <rect x="140" y="60" width="120" height="160" rx="12" fill="#1e0a3c" stroke="#7c3aed" stroke-width="2"/>
  <!-- Reactor top dome -->
  <ellipse cx="200" cy="60" rx="60" ry="16" fill="#2d1052" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Reactor bottom dome -->
  <ellipse cx="200" cy="220" rx="60" ry="16" fill="#2d1052" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Liquid inside -->
  <rect x="148" y="130" width="104" height="82" rx="0" fill="#7c3aed" opacity="0.15"/>
  <rect x="148" y="170" width="104" height="42" rx="0" fill="#a78bfa" opacity="0.12"/>
  <!-- Agitator shaft -->
  <line x1="200" y1="60" x2="200" y2="220" stroke="#6d28d9" stroke-width="2.5"/>
  <!-- Agitator blades -->
  <line x1="162" y1="150" x2="238" y2="150" stroke="#a78bfa" stroke-width="3"/>
  <line x1="168" y1="170" x2="232" y2="170" stroke="#a78bfa" stroke-width="2.5"/>
  <line x1="172" y1="190" x2="228" y2="190" stroke="#a78bfa" stroke-width="2"/>
  <!-- Sight glass -->
  <rect x="152" y="100" width="16" height="50" rx="4" fill="#0f0520" stroke="#7c3aed" stroke-width="1"/>
  <rect x="154" y="118" width="12" height="28" rx="2" fill="#7c3aed" opacity="0.3"/>
  <!-- Manhole -->
  <ellipse cx="200" cy="80" rx="20" ry="8" fill="#2d1052" stroke="#a78bfa" stroke-width="1"/>
  <!-- Nozzles -->
  <rect x="108" y="110" width="34" height="8" rx="3" fill="#4c1d95"/>
  <rect x="258" y="110" width="34" height="8" rx="3" fill="#4c1d95"/>
  <rect x="108" y="160" width="34" height="8" rx="3" fill="#4c1d95"/>
  <rect x="258" y="160" width="34" height="8" rx="3" fill="#4c1d95"/>
  <!-- Pipe top -->
  <rect x="193" y="30" width="14" height="32" rx="4" fill="#4c1d95"/>

  <!-- Left flask / separator -->
  <path d="M50 100 L50 160 Q50 200 75 200 Q100 200 100 160 L100 100 Z" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1.5"/>
  <path d="M50 165 Q50 196 75 196 Q100 196 100 165 Z" fill="#a78bfa" opacity="0.2"/>
  <rect x="65" y="75" width="20" height="27" rx="4" fill="#2d1052" stroke="#6d28d9" stroke-width="1"/>
  <!-- Flask bubbles -->
  <circle cx="68" cy="175" r="4" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="82" cy="168" r="3" fill="#c4b5fd" opacity="0.3"/>
  <circle cx="75" cy="182" r="2" fill="#c4b5fd" opacity="0.5"/>
  <!-- Pipe from flask to reactor -->
  <rect x="98" y="113" width="43" height="6" rx="2" fill="#4c1d95"/>

  <!-- Right condenser -->
  <rect x="298" y="80" width="30" height="120" rx="6" fill="#1e0a3c" stroke="#7c3aed" stroke-width="1.5"/>
  <!-- Cooling coils inside -->
  <path d="M306 95 Q320 100 306 110 Q320 120 306 130 Q320 140 306 150 Q320 160 306 170 Q320 180 306 185" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.7"/>
  <!-- Pipe to condenser -->
  <rect x="258" y="163" width="42" height="6" rx="2" fill="#4c1d95"/>
  <!-- Output pipe condenser -->
  <rect x="298" y="193" width="60" height="6" rx="2" fill="#4c1d95"/>

  <!-- Control panel bottom left -->
  <rect x="20" y="185" width="80" height="70" rx="6" fill="#160830" stroke="#4c1d95" stroke-width="1"/>
  <circle cx="40" cy="205" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="60" cy="205" r="7" fill="#f59e0b" opacity="0.8"/>
  <circle cx="80" cy="205" r="7" fill="#22c55e" opacity="0.8"/>
  <rect x="30" y="218" width="60" height="28" rx="3" fill="#0a0520"/>
  <text x="60" y="230" text-anchor="middle" font-size="7" fill="#a78bfa" font-family="monospace">P: 2.4 bar</text>
  <text x="60" y="239" text-anchor="middle" font-size="7" fill="#c4b5fd" font-family="monospace">T: 145°C</text>
  <text x="60" y="248" text-anchor="middle" font-size="7" fill="#f59e0b" font-family="monospace">pH: 7.2</text>

  <!-- Glowing particles -->
  <circle cx="130" cy="35" r="3" fill="#a78bfa" opacity="0.6"/>
  <circle cx="270" cy="42" r="2" fill="#7c3aed" opacity="0.5"/>
  <circle cx="350" cy="30" r="2.5" fill="#c4b5fd" opacity="0.4"/>
  <circle cx="30" cy="50" r="2" fill="#a78bfa" opacity="0.5"/>

  <!-- Molecule dots top right -->
  <circle cx="360" cy="80" r="5" fill="#7c3aed" opacity="0.6"/>
  <circle cx="378" cy="70" r="4" fill="#a78bfa" opacity="0.5"/>
  <circle cx="370" cy="60" r="3" fill="#7c3aed" opacity="0.4"/>
  <line x1="360" y1="80" x2="378" y2="70" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
  <line x1="378" y1="70" x2="370" y2="60" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>

</svg>
