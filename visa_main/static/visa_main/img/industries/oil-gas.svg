<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1008"/>
      <stop offset="100%" style="stop-color:#2d1a04"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#fef08a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tank" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#292524"/>
      <stop offset="100%" style="stop-color:#1c1008"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Ground / platform -->
  <rect x="0" y="230" width="400" height="70" fill="#1c1008"/>
  <rect x="0" y="228" width="400" height="4" fill="#292524"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="80" x2="400" y2="80" stroke="#ffffff04" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#ffffff04" stroke-width="1"/>

  <!-- Derrick / drilling tower left -->
  <polygon points="60,228 90,228 82,60 68,60" fill="#292524" stroke="#f97316" stroke-width="1"/>
  <!-- Cross braces -->
  <line x1="68" y1="100" x2="82" y2="100" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
  <line x1="66" y1="140" x2="84" y2="140" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
  <line x1="64" y1="180" x2="86" y2="180" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
  <line x1="62" y1="210" x2="88" y2="210" stroke="#f97316" stroke-width="1.5" opacity="0.6"/>
  <!-- X braces -->
  <line x1="68" y1="100" x2="82" y2="140" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <line x1="82" y1="100" x2="68" y2="140" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <line x1="66" y1="140" x2="84" y2="180" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <line x1="84" y1="140" x2="66" y2="180" stroke="#78350f" stroke-width="1" opacity="0.5"/>
  <!-- Crown block -->
  <rect x="62" y="55" width="26" height="8" rx="2" fill="#f97316" opacity="0.8"/>
  <!-- Hook & drill pipe -->
  <line x1="75" y1="63" x2="75" y2="228" stroke="#44403c" stroke-width="3"/>
  <!-- Engine house base -->
  <rect x="50" y="210" width="50" height="20" rx="3" fill="#292524"/>

  <!-- Separator vessel center -->
  <ellipse cx="195" cy="135" rx="12" ry="85" fill="#292524" stroke="#f97316" stroke-width="1.5"/>
  <rect x="183" y="135" width="24" height="80" fill="#1c1008"/>
  <ellipse cx="195" cy="215" rx="12" ry="8" fill="#292524" stroke="#f97316" stroke-width="1.5"/>
  <!-- Liquid levels inside -->
  <rect x="184" y="175" width="22" height="38" fill="#f97316" opacity="0.1"/>
  <rect x="184" y="195" width="22" height="18" fill="#78350f" opacity="0.3"/>
  <!-- Nozzle pipes -->
  <rect x="160" y="155" width="25" height="6" rx="2" fill="#44403c"/>
  <rect x="210" y="155" width="25" height="6" rx="2" fill="#44403c"/>
  <rect x="187" y="50" width="16" height="25" rx="3" fill="#44403c"/>
  <rect x="187" y="213" width="16" height="18" rx="3" fill="#44403c"/>
  <!-- Label -->
  <text x="195" y="122" text-anchor="middle" font-size="7" fill="#fb923c" font-family="monospace">SEPARATOR</text>

  <!-- Storage tank right -->
  <ellipse cx="320" cy="170" rx="58" ry="62" fill="url(#tank)" stroke="#f97316" stroke-width="1.5"/>
  <ellipse cx="320" cy="145" rx="58" ry="18" fill="#292524" stroke="#f97316" stroke-width="1"/>
  <!-- Fill lines on tank -->
  <line x1="264" y1="170" x2="376" y2="170" stroke="#44403c" stroke-width="1" opacity="0.5"/>
  <line x1="264" y1="185" x2="376" y2="185" stroke="#44403c" stroke-width="1" opacity="0.4"/>
  <line x1="264" y1="200" x2="376" y2="200" stroke="#44403c" stroke-width="1" opacity="0.3"/>
  <!-- Ladder on tank -->
  <line x1="370" y1="145" x2="370" y2="228" stroke="#44403c" stroke-width="2"/>
  <line x1="376" y1="145" x2="376" y2="228" stroke="#44403c" stroke-width="2"/>
  <line x1="370" y1="160" x2="376" y2="160" stroke="#78350f" stroke-width="1.5"/>
  <line x1="370" y1="175" x2="376" y2="175" stroke="#78350f" stroke-width="1.5"/>
  <line x1="370" y1="190" x2="376" y2="190" stroke="#78350f" stroke-width="1.5"/>
  <line x1="370" y1="205" x2="376" y2="205" stroke="#78350f" stroke-width="1.5"/>
  <!-- Oil inside tank -->
  <ellipse cx="320" cy="195" rx="52" ry="12" fill="#78350f" opacity="0.3"/>
  <!-- Tank label -->
  <text x="320" y="168" text-anchor="middle" font-size="9" fill="#fb923c" font-family="monospace">CRUDE OIL</text>
  <text x="320" y="180" text-anchor="middle" font-size="7" fill="#a16207" font-family="monospace">STORAGE</text>

  <!-- Flare stack -->
  <rect x="130" y="80" width="8" height="150" rx="3" fill="#44403c"/>
  <!-- Flame at top -->
  <ellipse cx="134" cy="72" r="14" fill="url(#glow)"/>
  <path d="M126 80 Q128 65 134 55 Q138 65 136 72 Q142 60 140 80 Q136 70 134 75 Q132 65 126 80Z" fill="url(#flame)" opacity="0.9"/>
  <!-- Heat waves -->
  <path d="M128 50 Q130 42 128 35" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M134 45 Q136 37 134 30" stroke="#fef08a" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M140 50 Q142 42 140 35" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Pipe network connecting -->
  <rect x="90" y="195" width="72" height="7" rx="3" fill="#44403c"/>
  <rect x="234" y="158" width="28" height="7" rx="3" fill="#44403c"/>

  <!-- Pump unit -->
  <rect x="100" y="210" width="50" height="20" rx="4" fill="#292524" stroke="#f97316" stroke-width="1"/>
  <circle cx="125" cy="220" r="6" fill="#44403c" stroke="#f97316" stroke-width="1"/>
  <circle cx="125" cy="220" r="3" fill="#f97316" opacity="0.6"/>
  <text x="125" y="243" text-anchor="middle" font-size="7" fill="#fb923c" font-family="monospace">PUMP</text>

  <!-- Stars -->
  <circle cx="200" cy="25" r="1.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="280" cy="35" r="1" fill="#fbbf24" opacity="0.4"/>
  <circle cx="50" cy="30" r="1.5" fill="#fbbf24" opacity="0.3"/>
  <circle cx="350" cy="20" r="1" fill="#fbbf24" opacity="0.4"/>

  <text x="200" y="270" text-anchor="middle" font-size="11" fill="#fb923c" font-family="sans-serif" letter-spacing="2">OIL &amp; GAS</text>
</svg>
